<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Reader</title>
  <link rel="stylesheet" href="/docs/css/pdf-reader.css">
  <link rel="stylesheet" href="/docs/css/reading.css"><!-- 评论模态样式 .kb-annot-popup / .kb-cmt-* -->
  <!-- Mode detection MUST run before body renders, so embed styles apply immediately -->
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var isEmbed = params.get("embed") === "1";
      window.__PDF_EMBED__ = isEmbed;
      if (isEmbed) {
        document.documentElement.classList.add("pdf-embed");
      }

      var pdfParam = params.get("pdf");
      if (pdfParam) {
        // Derive context .md path: strip .pdf suffix. In standalone mode, set hash
        // so ai-sidebar.js's getPagePath() reads the sibling extract file.
        // In embed mode the PARENT already has the right hash (the page being viewed),
        // and we delegate AI calls to the parent's sidebar — so DON'T touch hash.
        var contextPath = pdfParam.replace(/\.pdf$/i, "");
        if (!isEmbed && !window.location.hash) {
          history.replaceState(null, "", window.location.pathname + window.location.search + "#/" + contextPath);
        }
        window.__PDF_URL__ = "/" + pdfParam.replace(/^\/+/, "");
        window.__PDF_TITLE__ = params.get("title") || pdfParam.split("/").pop();
        window.__CONTEXT_PATH__ = contextPath;
      }
    })();
  </script>
  <!-- ai-sidebar.css only needed in standalone mode -->
  <script>
    if (!window.__PDF_EMBED__) {
      var l = document.createElement("link");
      l.rel = "stylesheet";
      l.href = "/docs/css/ai-sidebar.css";
      document.head.appendChild(l);
    }
  </script>
</head>
<body>

  <!-- ===== Toolbar ===== -->
  <div class="pdf-toolbar">
    <span class="pdf-title" id="pdf-title">Loading…</span>

    <div class="pdf-nav">
      <button class="pdf-btn" id="prev-page" title="Previous page">◀</button>
      <input type="text" id="page-input" value="1">
      <span id="page-info">/ —</span>
      <button class="pdf-btn" id="next-page" title="Next page">▶</button>
    </div>

    <div class="pdf-zoom">
      <button class="pdf-btn" id="zoom-out" title="Zoom out">−</button>
      <select id="zoom-select" title="Zoom">
        <option value="page-width" selected>Fit Width</option>
        <option value="page-fit">Fit Page</option>
        <option value="0.75">75%</option>
        <option value="1">100%</option>
        <option value="1.25">125%</option>
        <option value="1.5">150%</option>
        <option value="2">200%</option>
      </select>
      <button class="pdf-btn" id="zoom-in" title="Zoom in">+</button>
    </div>

    <div class="pdf-actions">
      <button class="pdf-btn pdf-embed-only" id="open-tab-btn" title="在新标签打开">↗ 新标签</button>
      <button class="pdf-btn pdf-standalone-only" id="back-btn" title="Back to KB">← 返回</button>
    </div>
  </div>

  <!-- ===== Viewer ===== -->
  <div id="pdf-viewer">
    <div class="pdf-pages" id="pdf-pages"></div>
    <div class="pdf-status" id="pdf-status">
      <div class="spinner"></div>
      <div id="pdf-status-text">加载 PDF 中…</div>
    </div>
  </div>

  <!-- ===== AI Sidebar slot — filled by ai-sidebar-mount.js in standalone mode only.
       In embed mode the slot stays empty and the parent window owns the sidebar. ===== -->
  <div id="ai-sidebar-slot"></div>

  <!-- 独立阅读时的「问 AI」常驻按钮：嵌入模式由 .pdf-standalone-only 隐藏；
       id=ai-open-btn 由 ai-sidebar.js 自动接管点击（openSidebar）。无需选中文字即可打开。 -->
  <button id="ai-open-btn" type="button" class="pdf-ai-fab pdf-standalone-only" title="问 AI">&#128172; 问 AI</button>

  <!-- ===== 选区工具条（嵌入模式）：问 AI + ✎ 笔记 合一，避免两个浮动按钮互相打架。
       独立模式下 AI 由 ai-sidebar 的 #ai-float-bar 提供，「笔记」按钮会注入那个条，本条不显示。 ===== -->
  <div id="pdf-sel-bar" class="pdf-sel-bar" style="display:none">
    <button type="button" id="pdf-ask-btn" class="pdf-sel-btn">问 AI</button>
    <button type="button" id="pdf-note-btn" class="pdf-sel-btn pdf-note-btn">✎ 笔记</button>
  </div>

  <!-- ===== Scripts =====
       Standalone mode: bootstrapAiSidebar handles markup + all deps
       (marked, DOMPurify, katex, ai-sidebar.js) in one shot.
       Embed mode: skip — the iframe never owns its own sidebar. -->
  <script>
    if (!window.__PDF_EMBED__) {
      var mountScript = document.createElement("script");
      mountScript.src = "/docs/js/ai-sidebar-mount.js?v=3";
      mountScript.onload = function () {
        window.bootstrapAiSidebar({
          title: "AI Assistant · PDF 阅读",
          placeholder: "就这篇论文提问，选中段落后点浮动按钮更精准",
        });
      };
      document.body.appendChild(mountScript);
    }
  </script>

  <!-- 共享评论模态（定义 window.KBComments.CommentModal），PDF 行内笔记复用 -->
  <script src="/docs/js/comment-modal.js"></script>

  <!-- ===== PDF.js Viewer ===== -->
  <script type="module">
    import * as pdfjsLib from "/docs/vendor/pdfjs/build/pdf.mjs";
    pdfjsLib.GlobalWorkerOptions.workerSrc = "/docs/vendor/pdfjs/build/pdf.worker.mjs";

    // ===== State =====
    const isEmbed = !!window.__PDF_EMBED__;
    const pdfUrl = window.__PDF_URL__;
    const pdfTitle = window.__PDF_TITLE__ || "PDF";

    const viewer = document.getElementById("pdf-viewer");
    const pagesEl = document.getElementById("pdf-pages");
    const statusEl = document.getElementById("pdf-status");
    const statusText = document.getElementById("pdf-status-text");
    const titleEl = document.getElementById("pdf-title");
    const pageInput = document.getElementById("page-input");
    const pageInfo = document.getElementById("page-info");
    const zoomSelect = document.getElementById("zoom-select");
    const prevBtn = document.getElementById("prev-page");
    const nextBtn = document.getElementById("next-page");
    const zoomInBtn = document.getElementById("zoom-in");
    const zoomOutBtn = document.getElementById("zoom-out");
    const backBtn = document.getElementById("back-btn");
    const openTabBtn = document.getElementById("open-tab-btn");

    titleEl.textContent = pdfTitle;

    let pdfDoc = null;
    let currentZoom = "page-width";   // "page-width" | "page-fit" | numeric string
    let pageCount = 0;
    let renderedPages = new Map();    // pageNum -> {container, width, height}
    let currentPage = 1;
    let renderTaskId = 0;             // bumped on every zoom change

    // ===== Helpers =====
    function setStatus(msg, show = true) {
      statusText.textContent = msg;
      statusEl.style.display = show ? "block" : "none";
    }

    function computeScale(page) {
      const baseViewport = page.getViewport({ scale: 1 });
      const available = viewer.clientWidth - 48;  // padding
      if (currentZoom === "page-width") {
        return available / baseViewport.width;
      }
      if (currentZoom === "page-fit") {
        const availableH = viewer.clientHeight - 48;
        return Math.min(available / baseViewport.width, availableH / baseViewport.height);
      }
      return parseFloat(currentZoom) || 1;
    }

    // ===== Two-phase rendering =====
    // Phase 1: setupPlaceholders() — for every page, compute viewport dimensions
    //   (metadata-only, very fast) and create/resize an empty container. After this,
    //   scroll height is accurate and the user can scroll anywhere immediately.
    // Phase 2: renderPageCanvas(n) — actually paint the canvas + text layer for page n.
    //   Called on-demand by renderVisiblePages() when a page enters viewport.
    //
    // This is the standard PDF viewer virtualization trick: a 24-page PDF no longer
    // blocks the main thread for seconds during initial load — only page 1 (and its
    // neighbors via buffer) render up front; the rest render lazily on scroll.

    async function setupPlaceholders() {
      const taskId = renderTaskId;
      for (let i = 1; i <= pageCount; i++) {
        if (taskId !== renderTaskId) return;
        const page = await pdfDoc.getPage(i);
        if (taskId !== renderTaskId) return;
        const scale = computeScale(page);
        const viewport = page.getViewport({ scale });

        let info = renderedPages.get(i);
        if (!info) {
          const container = document.createElement("div");
          container.className = "pdf-page";
          container.dataset.pageNum = i;
          const canvas = document.createElement("canvas");
          const textLayerDiv = document.createElement("div");
          textLayerDiv.className = "textLayer";
          container.appendChild(canvas);
          container.appendChild(textLayerDiv);
          pagesEl.appendChild(container);
          info = { container, width: 0, height: 0, rendered: false, rendering: false };
          renderedPages.set(i, info);
        }
        info.container.style.width = viewport.width + "px";
        info.container.style.height = viewport.height + "px";
        info.width = viewport.width;
        info.height = viewport.height;
        info.rendered = false; // scale may have changed — mark dirty
      }
    }

    async function renderPageCanvas(pageNum) {
      const info = renderedPages.get(pageNum);
      if (!info || info.rendering || info.rendered) return;
      info.rendering = true;
      const taskId = renderTaskId;
      try {
        const page = await pdfDoc.getPage(pageNum);
        if (taskId !== renderTaskId) return;
        const scale = computeScale(page);
        const devicePixelRatio = window.devicePixelRatio || 1;
        const viewport = page.getViewport({ scale });

        const canvas = info.container.querySelector("canvas");
        const textLayerDiv = info.container.querySelector(".textLayer");
        textLayerDiv.innerHTML = "";

        canvas.width = Math.floor(viewport.width * devicePixelRatio);
        canvas.height = Math.floor(viewport.height * devicePixelRatio);
        canvas.style.width = viewport.width + "px";
        canvas.style.height = viewport.height + "px";
        info.container.style.width = viewport.width + "px";
        info.container.style.height = viewport.height + "px";

        const ctx = canvas.getContext("2d");
        const transform = devicePixelRatio !== 1 ? [devicePixelRatio, 0, 0, devicePixelRatio, 0, 0] : null;
        await page.render({ canvasContext: ctx, viewport, transform }).promise;
        if (taskId !== renderTaskId) return;

        textLayerDiv.style.setProperty("--scale-factor", viewport.scale);
        textLayerDiv.style.width = viewport.width + "px";
        textLayerDiv.style.height = viewport.height + "px";
        const textContent = await page.getTextContent();
        if (taskId !== renderTaskId) return;

        await pdfjsLib.renderTextLayer({
          textContentSource: textContent,
          container: textLayerDiv,
          viewport,
          textDivs: [],
        }).promise;

        info.width = viewport.width;
        info.height = viewport.height;
        info.rendered = true;
        applyHighlights(pageNum);  // 渲染完按当前缩放重投影该页的评论高亮
      } finally {
        info.rendering = false;
      }
    }

    // Only render pages that are in or near the current viewport (±1 viewport buffer).
    function renderVisiblePages() {
      const viewerTop = viewer.scrollTop;
      const viewerBottom = viewerTop + viewer.clientHeight;
      const buffer = viewer.clientHeight;
      for (const [num, info] of renderedPages) {
        const top = info.container.offsetTop;
        const bottom = top + info.height;
        const inView = bottom >= viewerTop - buffer && top <= viewerBottom + buffer;
        if (inView) renderPageCanvas(num);
      }
    }

    async function renderAll() {
      ++renderTaskId;
      await setupPlaceholders();
      renderVisiblePages();
    }

    // ===== Scroll to page =====
    function scrollToPage(pageNum) {
      const info = renderedPages.get(pageNum);
      if (!info) return;
      const offsetTop = info.container.offsetTop - 16;
      viewer.scrollTo({ top: offsetTop, behavior: "smooth" });
    }

    // ===== Track current page on scroll =====
    function updateCurrentPageFromScroll() {
      const viewerTop = viewer.scrollTop;
      const viewerMid = viewerTop + viewer.clientHeight / 3;
      let bestPage = 1;
      for (const [num, info] of renderedPages) {
        if (info.container.offsetTop <= viewerMid) bestPage = num;
        else break;
      }
      if (bestPage !== currentPage) {
        currentPage = bestPage;
        pageInput.value = bestPage;
      }
    }

    // ===== Load PDF =====
    async function load() {
      if (!pdfUrl) {
        setStatus("缺少参数：请用 ?pdf=<path> 指定 PDF 路径");
        return;
      }
      try {
        setStatus("加载 PDF 中…");
        const loadingTask = pdfjsLib.getDocument({
          url: pdfUrl,
          cMapUrl: "/docs/vendor/pdfjs/web/cmaps/",
          cMapPacked: true,
          standardFontDataUrl: "/docs/vendor/pdfjs/web/standard_fonts/",
        });
        pdfDoc = await loadingTask.promise;
        pageCount = pdfDoc.numPages;
        pageInfo.textContent = "/ " + pageCount;
        pageInput.max = pageCount;
        setStatus("", false);
        await renderAll();
        lastViewerWidth = viewer.clientWidth;
      } catch (e) {
        console.error(e);
        setStatus("加载失败：" + (e.message || e));
      }
    }

    // ===== Zoom change (re-render at new scale, reusing existing page containers) =====
    async function setZoom(value) {
      currentZoom = value;
      if (zoomSelect.value !== value) {
        const exists = Array.from(zoomSelect.options).some((o) => o.value === value);
        if (exists) zoomSelect.value = value;
      }
      // Don't clear pagesEl — renderPage() reuses existing containers and updates scale
      // in place. Pages transition smoothly instead of flashing to empty.
      await renderAll();
      scrollToPage(currentPage);
    }

    function stepZoom(delta) {
      const numeric = parseFloat(currentZoom);
      const base = isNaN(numeric) ? 1 : numeric;
      const next = Math.max(0.25, Math.min(4, base + delta));
      setZoom(next.toFixed(2));
    }

    // ===== Event Wiring =====
    zoomSelect.addEventListener("change", (e) => setZoom(e.target.value));
    zoomInBtn.addEventListener("click", () => stepZoom(0.2));
    zoomOutBtn.addEventListener("click", () => stepZoom(-0.2));

    prevBtn.addEventListener("click", () => scrollToPage(Math.max(1, currentPage - 1)));
    nextBtn.addEventListener("click", () => scrollToPage(Math.min(pageCount, currentPage + 1)));

    pageInput.addEventListener("change", () => {
      const n = parseInt(pageInput.value, 10);
      if (n >= 1 && n <= pageCount) scrollToPage(n);
      else pageInput.value = currentPage;
    });

    if (backBtn) {
      backBtn.addEventListener("click", () => {
        // 优先回到上一页（同标签内多是从论文卡点进来的）；没有历史（如新标签打开）才回首页。
        if (history.length > 1) history.back();
        else if (document.referrer) window.location.href = document.referrer;
        else window.location.href = "/";
      });
    }

    // 在新标签打开：去掉 embed=1 即为独立阅读页（仅内嵌模式显示，由 CSS .pdf-embed-only 控制）。
    if (openTabBtn) {
      openTabBtn.addEventListener("click", () => {
        const u = new URL(window.location.href);
        u.searchParams.delete("embed");
        window.open(u.href, "_blank", "noopener");
      });
    }

    let scrollRenderTimer;
    viewer.addEventListener("scroll", () => {
      requestAnimationFrame(updateCurrentPageFromScroll);
      // Debounced lazy-render: as user scrolls, render newly-visible pages.
      // 300ms lets the user blast through many pages without triggering renders
      // for pages they scrolled past; only the page they settle on gets rendered.
      clearTimeout(scrollRenderTimer);
      scrollRenderTimer = setTimeout(renderVisiblePages, 300);
    });

    // ===== Auto re-fit on container resize =====
    // 直接用 ResizeObserver 盯 #pdf-viewer 的尺寸：无论是父页「打开/关闭/拖动」AI 侧栏、还是
    // 窗口缩放，只要可视宽度真的变了且当前是 Fit Width / Fit Page，就防抖后按新宽度重排。
    // 比旧的「监听 window.resize + 轮询父页拖动状态」可靠——iframe 被父页布局挤窄时，
    // window.resize 在某些情况下不触发，但 ResizeObserver 一定能观察到元素尺寸变化。
    let lastViewerWidth = 0;
    let refitTimer;
    const refitObserver = new ResizeObserver(() => {
      if (currentZoom !== "page-width" && currentZoom !== "page-fit") return;
      clearTimeout(refitTimer);
      refitTimer = setTimeout(() => {
        if (Math.abs(viewer.clientWidth - lastViewerWidth) < 5) return;  // 宽度没变（如只变高）→ 不重排
        lastViewerWidth = viewer.clientWidth;
        setZoom(currentZoom);
      }, 200);  // 防抖：拖动/动画过程中连续触发，停下来 200ms 才真正重排
    });
    refitObserver.observe(viewer);

    // ===== AI + 评论：统一选区工具条 =====
    // 选区工具条（问 AI / ✎ 笔记）与评论标注合在下面这一段处理，避免「两个独立浮动按钮各自
    // 监听 mouseup/mousedown、互相遮挡又互相隐藏」的老毛病。
    // - 嵌入模式：本页自己的 #pdf-sel-bar（问 AI 桥接父页 __aiSidebar；✎ 笔记建本地标注）。
    // - 独立模式：AI 由 ai-sidebar.js 的 #ai-float-bar 负责，这里只把「✎ 笔记」按钮注入那个条。

    // ===== 行内评论标注（PDF 几何锚定）=====
    // 选中文字 → 浮出「✎ 笔记」→ 记录该选区在页内的矩形（scale=1 的 PDF 点坐标，缩放无关）
    // + 一个评论线程（复用 window.KBComments.CommentModal）。每页渲染后按当前缩放重投影矩形画
    // 高亮；点高亮重开评论。PDF 是固定版式，几何锚点天然稳定，无需像正文那样靠文本重定位。
    // 存储走 /api/reading（key = PDF 的 __CONTEXT_PATH__，与外层论文卡的笔记互不干扰）。
    const annotPath = window.__CONTEXT_PATH__ || "";
    let annots = [];
    let annotStatus = "unread";
    let modal = null;

    function apiBase() { return window.__KB_API_BASE || ""; }
    function uid() { return "a" + Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

    async function loadAnnots() {
      if (!annotPath) return;
      try {
        const r = await fetch(apiBase() + "/api/reading?path=" + encodeURIComponent(annotPath), { credentials: "include" });
        const d = await r.json();
        annotStatus = (d && d.status) || "unread";
        annots = ((d && d.annotations) || []).filter((a) => a && a.page);  // 只认 PDF 标注（有页码）
      } catch (e) { /* 离线/失败 → 空 */ }
    }
    function saveAnnots() {
      if (!annotPath) return;
      fetch(apiBase() + "/api/reading", {
        method: "PUT", headers: { "Content-Type": "application/json" }, credentials: "include",
        body: JSON.stringify({ path: annotPath, status: annotStatus, annotations: annots }),
      }).catch(() => {});
    }

    function pageScale(pageEl) {
      const tl = pageEl.querySelector(".textLayer");
      const s = tl ? parseFloat(tl.style.getPropertyValue("--scale-factor")) : NaN;
      return (s && !isNaN(s)) ? s : 1;
    }
    // 选区落在哪一页：用几何命中（视口坐标点落进哪个 .pdf-page 容器），比靠 DOM 祖先链稳——
    // PDF.js 文字层结构有时让 commonAncestorContainer 跑到页容器外，旧逻辑就找不到页、按钮不弹。
    function pageAtPoint(x, y) {
      for (const [num, info] of renderedPages) {
        const r = info.container.getBoundingClientRect();
        if (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom) return num;
      }
      return 0;
    }

    // 在某页容器内重画该页所有标注的高亮矩形（按当前缩放投影），点击重开评论线程。
    function applyHighlights(pageNum) {
      const info = renderedPages.get(pageNum);
      if (!info) return;
      const pageEl = info.container;
      pageEl.querySelectorAll(".pdf-annot-hl").forEach((el) => el.remove());
      const scale = pageScale(pageEl);
      annots.filter((a) => a.page === pageNum).forEach((ann) => {
        const n = (ann.comments || []).length;
        (ann.rects || []).forEach((r) => {
          const hl = document.createElement("div");
          hl.className = "pdf-annot-hl" + (n ? " has-notes" : "");
          hl.style.left = (r.x * scale) + "px";
          hl.style.top = (r.y * scale) + "px";
          hl.style.width = (r.w * scale) + "px";
          hl.style.height = (r.h * scale) + "px";
          hl.title = (n ? n + " 条笔记 · " : "") + (ann.exact || "").slice(0, 60);
          hl.addEventListener("click", function (e) { e.stopPropagation(); modal.open(ann); });
          pageEl.appendChild(hl);
        });
      });
    }

    function removeAnnot(ann) {
      annots = annots.filter((a) => a.id !== ann.id);
      applyHighlights(ann.page);
      saveAnnots();
    }

    // 选区 → 新标注：每个矩形换算成相对页面的 scale=1 坐标，存页码 + 原文 + 空评论线程。
    function createAnnotFromSelection() {
      const sel = window.getSelection();
      if (!sel || sel.isCollapsed || !sel.rangeCount) return;
      const exact = sel.toString().trim();
      if (!exact) return;
      const range = sel.getRangeAt(0);
      const crs = range.getClientRects();
      if (!crs.length) return;
      const f = crs[0];
      const pageNum = pageAtPoint((f.left + f.right) / 2, (f.top + f.bottom) / 2);
      const info = renderedPages.get(pageNum);
      if (!info) return;  // 选区不在已渲染页内
      const pageEl = info.container;
      const scale = pageScale(pageEl);
      const canvas = pageEl.querySelector("canvas");
      const base = (canvas || pageEl).getBoundingClientRect();
      const rects = [];
      for (let i = 0; i < crs.length; i++) {
        const r = crs[i];
        if (r.width < 1 || r.height < 1) continue;
        rects.push({ x: (r.left - base.left) / scale, y: (r.top - base.top) / scale, w: r.width / scale, h: r.height / scale });
      }
      sel.removeAllRanges();
      const ann = { id: uid(), page: pageNum, exact: exact, rects: rects, comments: [], updated: new Date().toISOString() };
      annots.push(ann);
      applyHighlights(pageNum);
      modal.open(ann);
    }

    function selText() {
      const sel = window.getSelection();
      return (sel && !sel.isCollapsed && sel.rangeCount) ? sel.toString().trim() : "";
    }

    // ===== 选区工具条 =====
    if (isEmbed) {
      // 嵌入模式：本页自己的 #pdf-sel-bar（问 AI + ✎ 笔记 合一）。一个 show/hide、一套定位，
      // 两个按钮总是一起出现，不再各自监听、互相遮挡又互相隐藏。
      const selBar = document.getElementById("pdf-sel-bar");
      const askBtn = document.getElementById("pdf-ask-btn");
      const noteBtn = document.getElementById("pdf-note-btn");
      let lastSel = "";
      function showSelBar() {
        const t = selText();
        if (!t) { selBar.style.display = "none"; return; }
        lastSel = t;
        const rect = window.getSelection().getRangeAt(0).getBoundingClientRect();
        selBar.style.visibility = "hidden";
        selBar.style.display = "flex";
        const bw = selBar.offsetWidth || 150, bh = selBar.offsetHeight || 34, m = 6;
        let top = rect.bottom + m;
        if (top + bh + m > window.innerHeight) top = rect.top - bh - m;
        top = Math.max(m, Math.min(top, window.innerHeight - bh - m));
        const left = Math.max(m, Math.min(rect.left, window.innerWidth - bw - m));
        selBar.style.top = (window.scrollY + top) + "px";
        selBar.style.left = (window.scrollX + left) + "px";
        selBar.style.visibility = "";
      }
      document.addEventListener("mouseup", function () { setTimeout(showSelBar, 12); });
      document.addEventListener("mousedown", function (e) { if (!selBar.contains(e.target)) selBar.style.display = "none"; });
      selBar.addEventListener("mousedown", function (e) { e.preventDefault(); });  // 别让 mousedown 清掉选区
      askBtn.addEventListener("click", function (e) {
        e.preventDefault(); e.stopPropagation();
        selBar.style.display = "none";
        try {
          if (window.parent && window.parent !== window && window.parent.__aiSidebar) {
            window.parent.__aiSidebar.openWithSelection(lastSel || "", window.__CONTEXT_PATH__ || "");
            return;
          }
        } catch (e2) { /* 跨域 → 落到提示 */ }
        alert("AI 助手未就绪：请确认父页面已加载 AI 侧边栏脚本。");
      });
      noteBtn.addEventListener("click", function (e) {
        e.preventDefault(); e.stopPropagation();
        selBar.style.display = "none";
        createAnnotFromSelection();
      });
    } else {
      // 独立模式：AI 由 ai-sidebar.js 的 #ai-float-bar 提供。把「✎ 笔记」按钮注入那个条，
      // 共用它的出现/消失逻辑（与正文页 reading.js 一致），不另起浮动按钮，避免打架。
      document.addEventListener("mouseup", function () {
        setTimeout(function () {
          const fb = document.getElementById("ai-float-bar");
          if (!fb) return;
          let nb = fb.querySelector("#pdf-note-action");
          if (!nb) {
            nb = document.createElement("button");
            nb.id = "pdf-note-action"; nb.type = "button"; nb.className = "ai-float-action"; nb.textContent = "✎ 笔记";
            nb.addEventListener("mousedown", function (e) { e.preventDefault(); });
            nb.addEventListener("click", function (e) {
              e.preventDefault(); e.stopPropagation();
              fb.style.display = "none";
              createAnnotFromSelection();
            });
            fb.appendChild(nb);
          }
          nb.style.display = selText() ? "" : "none";
        }, 14);  // 比 ai-sidebar 的 10ms 晚一点，确保浮条已出现
      });
    }

    // Kick off
    modal = new window.KBComments.CommentModal({
      onChange: function () { if (modal.ann) applyHighlights(modal.ann.page); saveAnnots(); },
      onCancelEmpty: function (ann) { removeAnnot(ann); },
    });
    loadAnnots().then(load);
  </script>
</body>
</html>
