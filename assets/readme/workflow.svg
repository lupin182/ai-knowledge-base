<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="760" viewBox="0 0 1180 760" role="img" aria-labelledby="title desc">
  <title id="title">AI Knowledge Base Workflow Architecture</title>
  <desc id="desc">Workflow architecture from Markdown knowledge bases through Astro build, FastAPI, AI providers, tools and rebuild loop.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <linearGradient id="header" x1="120" y1="64" x2="1060" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="0.52" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1180" height="760" rx="28" fill="#f8fafc"/>
  <text x="590" y="70" fill="url(#header)" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="40" font-weight="850" text-anchor="middle">Workflow Architecture</text>
  <text x="590" y="107" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" text-anchor="middle">Markdown content, static reading, AI tool calls, and rebuild loop</text>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="750" text-anchor="middle">
    <rect x="80" y="170" width="210" height="88" rx="18" fill="#ffffff" stroke="#dbeafe" filter="url(#shadow)"/>
    <text x="185" y="207" fill="#1e3a8a" font-size="18">Browser UI</text>
    <text x="185" y="232" fill="#64748b" font-size="13">Astro pages + AI sidebar</text>

    <rect x="390" y="170" width="210" height="88" rx="18" fill="#ffffff" stroke="#e9d5ff" filter="url(#shadow)"/>
    <text x="495" y="207" fill="#6d28d9" font-size="18">FastAPI Server</text>
    <text x="495" y="232" fill="#64748b" font-size="13">StaticFiles + /api routes</text>

    <rect x="700" y="170" width="210" height="88" rx="18" fill="#ffffff" stroke="#bae6fd" filter="url(#shadow)"/>
    <text x="805" y="207" fill="#0369a1" font-size="18">Provider Router</text>
    <text x="805" y="232" fill="#64748b" font-size="13">Claude CLI / OpenAI API</text>

    <rect x="390" y="330" width="210" height="88" rx="18" fill="#ffffff" stroke="#bbf7d0" filter="url(#shadow)"/>
    <text x="495" y="367" fill="#15803d" font-size="18">Tool Runtime</text>
    <text x="495" y="392" fill="#64748b" font-size="13">Read / Edit / Write / Search</text>

    <rect x="80" y="330" width="210" height="88" rx="18" fill="#ffffff" stroke="#fed7aa" filter="url(#shadow)"/>
    <text x="185" y="367" fill="#c2410c" font-size="18">Markdown KB</text>
    <text x="185" y="392" fill="#64748b" font-size="13">knowledge_bases/&lt;slug&gt;</text>

    <rect x="700" y="330" width="210" height="88" rx="18" fill="#ffffff" stroke="#fbcfe8" filter="url(#shadow)"/>
    <text x="805" y="367" fill="#be185d" font-size="18">AI Response</text>
    <text x="805" y="392" fill="#64748b" font-size="13">SSE stream + tool events</text>

    <rect x="235" y="510" width="230" height="92" rx="18" fill="#ffffff" stroke="#c7d2fe" filter="url(#shadow)"/>
    <text x="350" y="548" fill="#4338ca" font-size="18">Sync Content</text>
    <text x="350" y="574" fill="#64748b" font-size="13">web/scripts/sync-content.mjs</text>

    <rect x="565" y="510" width="230" height="92" rx="18" fill="#ffffff" stroke="#bfdbfe" filter="url(#shadow)"/>
    <text x="680" y="548" fill="#1d4ed8" font-size="18">Astro Build</text>
    <text x="680" y="574" fill="#64748b" font-size="13">dist_new -> WEB_DIST</text>

    <rect x="895" y="510" width="205" height="92" rx="18" fill="#ffffff" stroke="#bae6fd" filter="url(#shadow)"/>
    <text x="997" y="548" fill="#0e7490" font-size="18">Static Site</text>
    <text x="997" y="574" fill="#64748b" font-size="13">served at localhost:8001</text>
  </g>

  <g fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)">
    <path d="M290 214 H382"/>
    <path d="M600 214 H692"/>
    <path d="M805 258 V321"/>
    <path d="M700 374 H608"/>
    <path d="M390 374 H298"/>
    <path d="M185 418 C185 484 258 497 326 510"/>
    <path d="M465 556 H557"/>
    <path d="M795 556 H887"/>
    <path d="M997 510 C1004 401 997 308 914 239"/>
    <path d="M495 330 C495 295 495 285 495 266"/>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#64748b">
    <text x="326" y="202">HTTP</text>
    <text x="637" y="202">/api/chat</text>
    <text x="821" y="301">model calls</text>
    <text x="630" y="362">stream</text>
    <text x="318" y="362">safe file ops</text>
    <text x="228" y="488">changed .md</text>
    <text x="505" y="545">sync</text>
    <text x="836" y="545">swap</text>
    <text x="1006" y="394">refresh</text>
  </g>
</svg>
