<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI 知识库</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="docs/vendor/css/theme-simple.css">
  <link rel="stylesheet" href="docs/css/kb-manager.css">
  <style>
    :root {
      --base-font-size: 15px;
      --theme-color: #3F51B5;
      --sidebar-width: 260px;
    }
    .markdown-section table {
      display: table;
      width: 100%;
    }
    /* 支持 LaTeX 公式的基本样式 */
    .katex { font-size: 1.1em; }
    /* 知识库统计卡片 */
    .kb-stats {
      display: flex;
      gap: 16px;
      margin: 12px 0 20px;
      flex-wrap: wrap;
    }
    .kb-stats .stat-card {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 8px;
      background: #f5f7fa;
      font-size: 14px;
      color: #555;
    }
    .kb-stats .stat-card .stat-num {
      font-size: 20px;
      font-weight: 700;
      color: var(--theme-color, #3F51B5);
    }
    /* 每页字数统计栏 */
    .page-stats-bar {
      font-size: 13px;
      color: #999;
      padding: 4px 0 12px;
      border-bottom: 1px solid #eee;
      margin-bottom: 16px;
    }
    /* 侧边栏折叠 */
    .sidebar-nav li.kb-collapsible {
      position: relative;
      padding-left: 14px;
      cursor: pointer;
    }
    .sidebar-nav li.kb-collapsible > ul { cursor: auto; }
    .sidebar-nav li.kb-collapsible > ul { display: none; }
    .sidebar-nav li.kb-collapsible.kb-expanded > ul { display: block; }
    .sidebar-nav li.kb-collapsible > .kb-toggle {
      position: absolute;
      left: 0;
      top: 6px;
      z-index: 2;
      display: inline-block;
      width: 14px;
      height: 16px;
      line-height: 16px;
      margin: 0;
      padding: 0;
      cursor: pointer;
      color: #999;
      user-select: none;
      transition: transform 0.15s;
      font-size: 10px;
      text-align: center;
    }
    .sidebar-nav li.kb-collapsible.kb-expanded > .kb-toggle { transform: rotate(90deg); }
    /* 纯文本分组标题外包一层 span.kb-label，保持行内显示（覆盖主题对 span 的 display:block） */
    .sidebar-nav li.kb-collapsible > .kb-label {
      display: inline;
      margin: 0;
      padding: 0;
      border: 0;
      font: inherit;
      color: inherit;
      text-transform: none;
    }
    /* hover 时标题文字变主题色，与链接 hover 视觉一致 */
    .sidebar-nav li.kb-collapsible:hover > .kb-toggle,
    .sidebar-nav li.kb-collapsible:hover > .kb-label,
    .sidebar-nav li.kb-collapsible:hover > strong {
      color: var(--theme-color);
    }
  </style>
  <link rel="stylesheet" href="docs/css/ai-sidebar.css">
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'AI 知识库',
      loadSidebar: '_sidebar.md',
      subMaxLevel: 3,
      search: {
        placeholder: '全文搜索...',
        noData: '没有找到结果',
        paths: 'auto',
        depth: 6,
        maxAge: 3600000,
        hideOtherSidebarContent: true
      },
      auto2top: false,
      relativePath: false,
      requestHeaders: {
        'cache-control': 'no-cache',
      },
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      }
    }
  </script>
  <script>
    // Docsify 插件：记住滚动位置 + 渲染完成后恢复
    var scrollPlugin = function(hook) {
      var KEY = 'docsify_scroll_pos';
      var saving = false;

      function savePos() {
        var hash = location.hash || '#/';
        try {
          var data = JSON.parse(sessionStorage.getItem(KEY) || '{}');
          data[hash] = window.scrollY;
          sessionStorage.setItem(KEY, JSON.stringify(data));
        } catch(e) {}
      }

      // doneEach: Docsify 每次渲染完页面后触发
      hook.doneEach(function() {
        var hash = location.hash || '#/';
        try {
          var data = JSON.parse(sessionStorage.getItem(KEY) || '{}');
          var pos = data[hash];
          if (pos > 0) {
            // 等图片/公式渲染完再滚动
            setTimeout(function() { window.scrollTo(0, pos); }, 100);
            setTimeout(function() { window.scrollTo(0, pos); }, 500);
          }
        } catch(e) {}

        // 开始监听滚动
        if (!saving) {
          saving = true;
          var timer;
          window.addEventListener('scroll', function() {
            clearTimeout(timer);
            timer = setTimeout(savePos, 200);
          }, true);
        }
      });
    };

    window.$docsify = window.$docsify || {};
    window.$docsify.plugins = (window.$docsify.plugins || []).concat(scrollPlugin);
  </script>
  <script>
    // 知识库统计插件 — 首页显示全局统计
    var statsPlugin = function(hook) {
      hook.doneEach(function() {
        var el = document.getElementById('kb-stats');
        if (!el || el.dataset.loaded) return;
        el.dataset.loaded = '1';
        fetch('/api/stats').then(function(r) { return r.json(); }).then(function(d) {
          var wan = (d.chars / 10000).toFixed(1);
          el.innerHTML =
            '<div class="stat-card"><span class="stat-num">' + d.files + '</span> 篇文档</div>' +
            '<div class="stat-card"><span class="stat-num">' + wan + ' 万</span> 字</div>';
        }).catch(function() {});
      });
    };
    // 每页字数 + 预估阅读时间插件
    var pageStatsPlugin = function(hook) {
      hook.doneEach(function() {
        var content = document.querySelector('.markdown-section');
        if (!content) return;
        // 移除旧的统计栏
        var old = content.querySelector('.page-stats-bar');
        if (old) old.remove();
        var text = content.textContent || '';
        // 统计中文字符 + 英文单词
        var cnChars = (text.match(/[\u4e00-\u9fff]/g) || []).length;
        var enWords = (text.match(/[a-zA-Z]+/g) || []).length;
        var total = cnChars + enWords;
        if (total < 10) return; // 太短不显示
        // 中文阅读速度约 400 字/分钟
        var minutes = Math.max(1, Math.round(total / 400));
        var bar = document.createElement('div');
        bar.className = 'page-stats-bar';
        bar.textContent = '约 ' + total.toLocaleString() + ' 字 · 预计阅读 ' + minutes + ' 分钟';
        content.insertBefore(bar, content.firstChild);
      });
    };
    window.$docsify.plugins = (window.$docsify.plugins || []).concat(statsPlugin, pageStatsPlugin);

    // 侧边栏折叠插件：支持 **加粗标题** / 纯文本分组 / 链接混合结构
    var sidebarCollapsePlugin = function(hook) {
      var STORAGE = 'kb_sidebar_expanded';
      function getExpanded() {
        try { return new Set(JSON.parse(sessionStorage.getItem(STORAGE) || '[]')); }
        catch(e) { return new Set(); }
      }
      function saveExpanded(set) {
        try { sessionStorage.setItem(STORAGE, JSON.stringify(Array.from(set))); } catch(e) {}
      }
      function getKey(li) {
        var clone = li.cloneNode(true);
        var nested = clone.querySelector('ul');
        if (nested) nested.remove();
        return (clone.textContent || '').trim().slice(0, 80);
      }
      function hasDirectChildUl(li) {
        for (var i = 0; i < li.children.length; i++) {
          if (li.children[i].tagName === 'UL') return true;
        }
        return false;
      }
      hook.doneEach(function() {
        var sidebar = document.querySelector('.sidebar-nav');
        if (!sidebar) return;
        var expanded = getExpanded();
        sidebar.querySelectorAll('li').forEach(function(li) {
          if (!hasDirectChildUl(li)) return;
          if (!li.classList.contains('kb-collapsible')) {
            li.classList.add('kb-collapsible');
            var toggle = document.createElement('span');
            toggle.className = 'kb-toggle';
            toggle.textContent = '▸';
            li.insertBefore(toggle, li.firstChild);
            // 把 li 的直接纯文本子节点包进 span.kb-label，便于 hover 染色
            Array.from(li.childNodes).forEach(function(node) {
              if (node.nodeType === 3 && node.textContent.trim()) {
                var label = document.createElement('span');
                label.className = 'kb-label';
                node.parentNode.insertBefore(label, node);
                label.appendChild(node);
              }
            });
            var doToggle = function(e) {
              e.preventDefault();
              e.stopPropagation();
              var isExp = li.classList.toggle('kb-expanded');
              var k = getKey(li);
              var exp = getExpanded();
              if (isExp) exp.add(k); else exp.delete(k);
              saveExpanded(exp);
            };
            toggle.addEventListener('click', doToggle);
            // 点击 li 自身的标题区域（非链接、非嵌套列表）也触发折叠
            li.addEventListener('click', function(e) {
              if (e.target.closest('a')) return;                 // 链接正常跳转
              if (e.target.closest('.kb-collapsible') !== li) return; // 让内层 li 自己处理
              doToggle(e);
            });
          }
          var shouldExpand = expanded.has(getKey(li)) || !!li.querySelector('.active');
          li.classList.toggle('kb-expanded', shouldExpand);
        });
      });
    };
    window.$docsify.plugins = (window.$docsify.plugins || []).concat(sidebarCollapsePlugin);
  </script>
  <script src="docs/vendor/js/docsify.min.js"></script>
  <script src="docs/vendor/js/search.min.js"></script>
  <!-- 数学公式支持 -->
  <script src="docs/vendor/js/docsify-katex.min.js"></script>
  <link rel="stylesheet" href="docs/vendor/katex/katex.min.css">
  <script src="docs/vendor/katex/katex.min.js"></script>
  <script src="docs/vendor/katex/auto-render.min.js"></script>

  <!-- AI Sidebar — markup + deps + ai-sidebar.js are all bootstrapped from
       ai-sidebar-mount.js (single source of truth for the AI helper unit). -->
  <div id="ai-sidebar-slot"></div>
  <script src="docs/js/ai-sidebar-mount.js?v=3"></script>
  <script>bootstrapAiSidebar({ initialQuotaText: "Loading quota..." });</script>
  <div class="top-right-btns">
    <div class="kb-switcher" id="kb-switcher">
      <button id="kb-switcher-btn" class="top-btn kb-btn" title="切换知识库">📚 <span id="kb-switcher-label">KB</span> ▾</button>
      <div class="kb-switcher-menu" id="kb-switcher-menu"></div>
    </div>
    <button id="edit-btn" class="top-btn edit-btn" title="Edit source (Ctrl+Shift+E)">Edit</button>
    <button id="ai-open-btn" class="top-btn ai-btn" title="Open AI Assistant (Ctrl+Shift+A)">AI</button>
  </div>

  <!-- 首次启动检测：未配置 backend 时顶部弹横幅引导去设置页 -->
  <div id="first-run-banner" style="display:none;position:fixed;top:0;left:0;right:0;z-index:9999;background:#fff3cd;color:#856404;padding:10px 20px;border-bottom:1px solid #ffeaa7;text-align:center;font-size:14px;">
    AI 后端尚未配置。<a href="docs/tools/settings.html" style="color:#3F51B5;font-weight:600;">前往设置 →</a>
  </div>
  <script>
    fetch('/api/settings/check').then(function(r){return r.json();}).then(function(d){
      if (!d.is_configured) document.getElementById('first-run-banner').style.display='block';
    }).catch(function(){});
  </script>

  <!-- Source Editor Panel -->
  <div id="editor-panel" class="editor-panel">
    <div class="editor-resize" id="editor-resize"></div>
    <div class="editor-toolbar">
      <span id="editor-filepath" class="editor-filepath"></span>
      <div class="editor-toolbar-btns">
        <button id="editor-save" class="editor-btn editor-btn-save">Save</button>
        <button id="editor-close" class="editor-btn editor-btn-cancel">Close</button>
      </div>
    </div>
    <div id="editor-container" class="editor-container"></div>
  </div>
